graph:
  path: data/knowledge_graph.db
wave:
  ticks: 10
  decay: 0.9
  activation_threshold: 0.5
similarity_threshold: 0.3
tension_threshold: 0.3
llm: true
online:
  enabled: true
  max_requests_per_run: 30
  timeout_seconds: 10
llm_ollama:
  enabled: true
  host: http://127.0.0.1:11434
  model: llama2
  use_for_hypotheses: true
  use_for_autonomous: true
export:
  default_dir: data/exports
advanced_autonomous:
  reflection_cycles: 3
  multi_seed: []
monitoring:
  show_progress: true
advanced:
  embeddings:
    enabled: false
vector:
  enabled: false
ingestion:
  pdf_enabled: true
